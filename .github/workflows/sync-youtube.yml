name: Sync YouTube Videos

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - name: Check sync secrets
        id: secret_check
        env:
          GOOGLE_OAUTH_CLIENT_JSON: ${{ secrets.GOOGLE_OAUTH_CLIENT_JSON }}
          YOUTUBE_OAUTH_TOKEN_JSON: ${{ secrets.YOUTUBE_OAUTH_TOKEN_JSON }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$GOOGLE_OAUTH_CLIENT_JSON" ] || [ -z "$YOUTUBE_OAUTH_TOKEN_JSON" ] || [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "Required YouTube/Firebase secrets are not set. Skipping sync."
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"
      - name: Write credential files
        if: steps.secret_check.outputs.ready == 'true'
        env:
          GOOGLE_OAUTH_CLIENT_JSON: ${{ secrets.GOOGLE_OAUTH_CLIENT_JSON }}
          YOUTUBE_OAUTH_TOKEN_JSON: ${{ secrets.YOUTUBE_OAUTH_TOKEN_JSON }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          printf '%s' "$GOOGLE_OAUTH_CLIENT_JSON" > credentials.json
          printf '%s' "$YOUTUBE_OAUTH_TOKEN_JSON" > token.json
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > serviceAccountKey.json
      - name: Sync YouTube uploads to local private JSON
        if: steps.secret_check.outputs.ready == 'true'
        env:
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          YOUTUBE_CHANNEL_HANDLE: ${{ secrets.YOUTUBE_CHANNEL_HANDLE || '@reskilling_pharmacist' }}
          YOUTUBE_CONTENTS_OUTPUT: data/contents-private.local.json
        run: npm run sync:youtube
      - name: Import contents to Firestore
        if: steps.secret_check.outputs.ready == 'true'
        env:
          FIREBASE_SERVICE_ACCOUNT: serviceAccountKey.json
          RESKILLING_CONTENTS_JSON: data/contents-private.local.json
        run: npm run import:contents
      - name: Verify public shell
        if: steps.secret_check.outputs.ready == 'true'
        run: npm run verify